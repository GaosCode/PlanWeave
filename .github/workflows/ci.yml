name: CI

on:
  push:
    paths-ignore:
      - "README.md"
      - "readme/**"
      - "DEVELOPMENT.md"
      - "CONTRIBUTING.md"
  pull_request:
    paths-ignore:
      - "README.md"
      - "readme/**"
      - "DEVELOPMENT.md"
      - "CONTRIBUTING.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu-gate:
    name: Ubuntu build, lint, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm 11 uses the bulk advisory endpoint required by the npm registry.
      # Block CI when the resolved dependency graph contains high or critical advisories.
      - name: Audit dependencies (high/critical)
        run: npx --yes pnpm@11.4.0 --pm-on-fail=ignore audit --audit-level=high

      # cli/desktop/mcp resolve @planweave-ai/runtime (and desktop also mcp) from
      # package exports that point at dist/. The root build prepares shared
      # dependencies once, then builds CLI and Desktop in parallel.
      - name: Build packages
        run: pnpm build

      # Distinct from typecheck so style/format failures are easy to spot in CI logs.
      - name: Biome check
        run: pnpm biome:check

      - name: Lint and typecheck
        run: pnpm lint

      - name: Create test report directory
        run: node -e "require('node:fs').mkdirSync('reports',{recursive:true})"

      - name: Run unit tests
        id: unit-tests
        timeout-minutes: 20
        run: pnpm test:unit --maxWorkers=2 --reporter=default --reporter=junit --outputFile.junit=reports/unit.xml

      - name: Report slowest unit tests
        if: always() && steps.unit-tests.outcome != 'skipped'
        run: node scripts/report-slowest-tests.mjs reports/unit.xml "Unit tests"

      - name: Redact failed Ubuntu test reports
        id: redact-unit
        if: steps.unit-tests.outcome == 'failure'
        run: node scripts/redact-ci-test-artifacts.mjs reports

      - name: Upload failed Ubuntu test reports
        if: steps.unit-tests.outcome == 'failure' && steps.redact-unit.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-ubuntu
          path: reports
          if-no-files-found: error
          retention-days: 7

  integration-tests:
    name: Integration tests (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: cli
            label: CLI
          - shard: core
            label: Runtime, Desktop, and MCP

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        timeout-minutes: 15
        run: pnpm build

      - name: Create test report directory
        run: node -e "require('node:fs').mkdirSync('reports',{recursive:true})"

      - name: Run integration tests
        id: integration-tests
        timeout-minutes: 15
        run: pnpm test:integration:${{ matrix.shard }} --maxWorkers=2 --reporter=default --reporter=junit --outputFile.junit=reports/integration-${{ matrix.shard }}.xml

      - name: Report slowest integration tests
        if: always() && steps.integration-tests.outcome != 'skipped'
        run: node scripts/report-slowest-tests.mjs reports/integration-${{ matrix.shard }}.xml "Integration (${{ matrix.label }})"

      - name: Redact failed integration test report
        id: redact-integration
        if: steps.integration-tests.outcome == 'failure'
        run: node scripts/redact-ci-test-artifacts.mjs reports

      - name: Upload failed integration test report
        if: steps.integration-tests.outcome == 'failure' && steps.redact-integration.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report-${{ matrix.shard }}
          path: reports
          if-no-files-found: error
          retention-days: 7

  performance-tests:
    name: Block Run Index performance regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        timeout-minutes: 15
        run: pnpm build

      - name: Create test report directory
        run: node -e "require('node:fs').mkdirSync('reports',{recursive:true})"

      - name: Run performance regression
        id: performance-tests
        timeout-minutes: 10
        run: pnpm test:performance --maxWorkers=1 --reporter=default --reporter=junit --outputFile.junit=reports/performance.xml

      - name: Report slowest performance tests
        if: always() && steps.performance-tests.outcome != 'skipped'
        run: node scripts/report-slowest-tests.mjs reports/performance.xml "Performance regression"

      - name: Redact failed performance test report
        id: redact-performance
        if: steps.performance-tests.outcome == 'failure'
        run: node scripts/redact-ci-test-artifacts.mjs reports

      - name: Upload failed performance test report
        if: steps.performance-tests.outcome == 'failure' && steps.redact-performance.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-report
          path: reports
          if-no-files-found: error
          retention-days: 7

  platform-tests:
    name: Platform tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create test report directory
        run: node -e "require('node:fs').mkdirSync('reports',{recursive:true})"

      - name: Run platform tests
        id: platform-tests
        timeout-minutes: 20
        run: pnpm test:platform --maxWorkers=2 --reporter=default --reporter=junit --outputFile.junit=reports/platform.xml

      - name: Report slowest platform tests
        if: always() && steps.platform-tests.outcome != 'skipped'
        run: node scripts/report-slowest-tests.mjs reports/platform.xml "Platform (${{ matrix.os }})"

      - name: Redact failed platform test report
        id: redact-platform
        if: steps.platform-tests.outcome == 'failure'
        run: node scripts/redact-ci-test-artifacts.mjs reports

      - name: Upload failed platform test report
        if: steps.platform-tests.outcome == 'failure' && steps.redact-platform.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: platform-test-report-${{ matrix.os }}
          path: reports
          if-no-files-found: error
          retention-days: 7

  windows-packaged-smoke:
    name: Windows unsigned packaged smoke
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Desktop
        timeout-minutes: 15
        run: pnpm --dir packages/desktop build

      - name: Package unsigned Windows app
        timeout-minutes: 20
        run: pnpm --dir packages/desktop pack:win

      - name: Run packaged Windows startup smoke
        timeout-minutes: 5
        env:
          PLANWEAVE_PACKAGED_PLATFORM: win32
          PLANWEAVE_CI_REPORT_PATH: reports/windows-packaged-smoke.json
        run: pnpm --dir packages/desktop smoke:packaged:win

      - name: Ensure packaged smoke failure report exists
        if: failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path reports | Out-Null
          if (-not (Test-Path reports/windows-packaged-smoke.json)) {
            '{"schemaVersion":1,"platform":"win32","status":"failed","failedStage":"build-or-package"}' | Set-Content reports/windows-packaged-smoke.json
          }

      - name: Redact packaged smoke failure report
        id: redact-packaged-smoke
        if: failure()
        run: node scripts/redact-ci-test-artifacts.mjs reports

      - name: Upload packaged smoke failure report
        if: failure() && steps.redact-packaged-smoke.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: windows-packaged-smoke-report
          path: reports
          if-no-files-found: error
          retention-days: 7
