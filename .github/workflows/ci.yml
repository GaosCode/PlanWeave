name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # cli/desktop/mcp resolve @planweave-ai/runtime (and desktop also mcp) from
      # package exports that point at dist/. Build once before typecheck; do not
      # embed build inside the typecheck script.
      - name: Build packages
        run: pnpm -r build

      - name: Lint and typecheck
        run: pnpm lint

      - name: Run tests
        run: pnpm test
